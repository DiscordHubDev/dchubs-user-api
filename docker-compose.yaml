version: '3.8'

services:
  # FastAPI
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_PORT=8080
        - APP_HOST=0.0.0.0
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
    volumes:
      - .:/app
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    container_name: redis_server
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

volumes:
  redis_data: