version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_PORT=8080
        - APP_HOST=0.0.0.0
    ports:
      - "10000:8080"
    environment:
      - APP_PORT=8080
      - APP_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy
    
    # 🟢 新增 FastAPI 的健康檢查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s    
      retries: 3
      start_period: 5s

  redis:
    image: redis:7-alpine
    container_name: redis_server
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    
    # 🟢 新增 Redis 的健康檢查（使用 redis-cli ping）
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data: