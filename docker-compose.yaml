version: '3.8'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - APP_PORT=8080
        - APP_HOST=0.0.0.0
    ports:
      - "8080:8080"
    environment:
      - APP_PORT=8080
      - APP_HOST=0.0.0.0
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      redis:
        condition: service_healthy  # 確保 redis 完全就緒、通過健康檢查後，web 才啟動
    
    # 🟢 新增 FastAPI 的健康檢查
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s     # 每 10 秒檢查一次
      timeout: 5s       # 逾時時間 5 秒
      retries: 3        # 失敗 3 次才判斷為 unhealthy
      start_period: 5s  # 容器啟動後的 5 秒緩衝期，期間失敗不計入

  redis:
    image: redis:7-alpine
    container_name: redis_server
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    
    # 🟢 新增 Redis 的健康檢查（使用 redis-cli ping）
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data: